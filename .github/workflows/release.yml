name: Release

on:
  release:
    types: [published]

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate version matches tag
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          PYPROJECT_VERSION=$(grep -m1 '^version =' pyproject.toml | sed 's/.*= *"\(.*\)"/\1/')

          if [ "$TAG_NAME" != "v$PYPROJECT_VERSION" ]; then
            echo "Error: Tag version '$TAG_NAME' does not match pyproject.toml version '$PYPROJECT_VERSION'"
            exit 1
          fi

          echo "Version validated: $PYPROJECT_VERSION"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.14
      - name: Install dependencies
        run: uv sync
      - name: Install ruff
        run: uv pip install ruff
      - name: Run ruff
        run: uv run ruff check websearch/

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Install mypy
        run: uv pip install mypy
      - name: Run mypy
        run: uv run mypy websearch/

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run tests
        run: uv run pytest tests/

  build:
    runs-on: ubuntu-latest
    needs: [validate-version, lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.14 && uv venv && uv pip install build
      - name: Build package
        run: rm -rf dist/ && uv run python -m build
      - name: List dist contents
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.14 && uv venv
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}
        run: uv pip install build && uv publish dist/*
